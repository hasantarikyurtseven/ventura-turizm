<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-container">
    <div class="topbar-left">
      <div class="logo-section" routerLink="/">
        <img src="/images/logo/logo.svg" alt="Ventura Turizm" class="logo-image">
      </div>
    </div>
    <div class="topbar-right">
      <a href="tel:4440644" class="topbar-link phone-link">
        <mat-icon>phone</mat-icon>
        <span>444 0 644</span>
      </a>
      <span class="topbar-separator">|</span>
      <button 
        *ngFor="let item of topBarItems" 
        mat-button 
        [routerLink]="item.route"
        class="topbar-link">
        <mat-icon *ngIf="item.icon">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </button>
      <span class="topbar-separator">|</span>

      <!-- Giriş yapmamış -->
      <ng-container *ngIf="!(authService.currentUser$ | async)">
        <button mat-button class="topbar-link login-link" (click)="openLoginModal()">
          <span>Giriş Yap</span>
        </button>
        <button mat-button class="topbar-link register-link" routerLink="/register">
          <span>Üye Ol</span>
        </button>
      </ng-container>

      <!-- Giriş yapmış -->
      <ng-container *ngIf="authService.currentUser$ | async as user">
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-chip">
          <div class="user-chip-inner">
            <mat-icon class="user-chip-icon">person</mat-icon>
            <span class="user-chip-name">{{ user.firstName }} {{ user.lastName }}</span>
            <mat-icon class="user-chip-arrow">expand_more</mat-icon>
          </div>
        </button>
        <mat-menu #userMenu="matMenu" class="user-dropdown-panel">
          <!-- Kullanıcı bilgi kartı -->
          <div class="user-dropdown-header" (click)="$event.stopPropagation()">
            <div class="user-dropdown-avatar">{{ getUserInitials() }}</div>
            <div class="user-dropdown-info">
              <span class="user-dropdown-name">{{ user.firstName }} {{ user.lastName }}</span>
              <span class="user-dropdown-email">{{ user.email }}</span>
            </div>
          </div>
          <hr style="margin:0;border:none;border-top:1px solid #f1f5f9;" />
          <button mat-menu-item class="user-dropdown-item" routerLink="/profil">
            <mat-icon>account_circle</mat-icon>
            <span>Profilim</span>
          </button>
          <button mat-menu-item class="user-dropdown-item" routerLink="/rezervasyonlarim">
            <mat-icon>confirmation_number</mat-icon>
            <span>Rezervasyonlarım</span>
          </button>
          <hr style="margin:0;border:none;border-top:1px solid #f1f5f9;" />
          <button mat-menu-item class="user-dropdown-item logout-item" (click)="onLogout()">
            <mat-icon>logout</mat-icon>
            <span>Çıkış Yap</span>
          </button>
        </mat-menu>
      </ng-container>
    </div>
  </div>
</div>

<!-- Menu Bar -->
<mat-toolbar class="menu-bar">
  <div class="menu-bar-container">
    <!-- Desktop Menu -->
    <nav class="desktop-menu">
      <button 
        *ngFor="let item of menuItems" 
        mat-button 
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: item.route === '/'}"
        [class.highlight]="item.highlight"
        class="nav-button">
        <mat-icon *ngIf="item.icon" class="nav-icon">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </button>
    </nav>

    <!-- Mobile Header: logo + sağ aksiyonlar -->
    <ng-container *ngIf="(isHandset$ | async)">
      <div class="mobile-header-bar">
        <div class="mobile-logo" routerLink="/">
          <img src="/images/logo/logo.svg" alt="Ventura Turizm" class="mobile-logo-img">
        </div>
        <div class="mobile-header-actions">
          <!-- Giriş yapılmış -->
          <ng-container *ngIf="authService.currentUser$ | async as user">
            <button mat-icon-button [matMenuTriggerFor]="mobileUserMenu" class="mobile-avatar-btn">
              <div class="mobile-avatar">{{ getUserInitials() }}</div>
            </button>
            <mat-menu #mobileUserMenu="matMenu" class="user-dropdown-panel">
              <div class="user-dropdown-header" (click)="$event.stopPropagation()">
                <div class="user-dropdown-avatar">{{ getUserInitials() }}</div>
                <div class="user-dropdown-info">
                  <span class="user-dropdown-name">{{ user.firstName }} {{ user.lastName }}</span>
                  <span class="user-dropdown-email">{{ user.email }}</span>
                </div>
              </div>
              <hr style="margin:0;border:none;border-top:1px solid #f1f5f9;" />
              <button mat-menu-item routerLink="/profil">
                <mat-icon>account_circle</mat-icon><span>Profilim</span>
              </button>
              <button mat-menu-item routerLink="/rezervasyonlarim">
                <mat-icon>confirmation_number</mat-icon><span>Rezervasyonlarım</span>
              </button>
              <hr style="margin:0;border:none;border-top:1px solid #f1f5f9;" />
              <button mat-menu-item (click)="onLogout()">
                <mat-icon>logout</mat-icon><span>Çıkış Yap</span>
              </button>
            </mat-menu>
          </ng-container>
          <!-- Giriş yapılmamış -->
          <ng-container *ngIf="!(authService.currentUser$ | async)">
            <button mat-button class="mobile-login-btn" (click)="openLoginModal()">
              <mat-icon>person</mat-icon>
              <span>Giriş Yap</span>
            </button>
          </ng-container>
        </div>
      </div>
    </ng-container>
  </div>
</mat-toolbar>
