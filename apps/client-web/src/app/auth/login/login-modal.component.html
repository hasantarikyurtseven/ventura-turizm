<div class="login-modal-container">
  <div class="login-modal-header">
    <h2>Giriş Yap</h2>
    <button mat-icon-button class="close-button" (click)="closeModal()" aria-label="Kapat">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <!-- Email -->
    <mat-form-field appearance="outline" class="form-field-full">
      <mat-label>E-posta</mat-label>
      <input matInput type="email" formControlName="email" placeholder="ornek@email.com">
      <mat-icon matPrefix>email</mat-icon>
      <mat-error *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
        {{ getErrorMessage('email') }}
      </mat-error>
      <mat-error *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
        {{ getErrorMessage('email') }}
      </mat-error>
    </mat-form-field>

    <!-- Password -->
    <mat-form-field appearance="outline" class="form-field-full">
      <mat-label>Şifre</mat-label>
      <input 
        matInput 
        [type]="hidePassword ? 'password' : 'text'" 
        formControlName="password" 
        placeholder="Şifrenizi giriniz">
      <mat-icon matPrefix>lock</mat-icon>
      <button 
        mat-icon-button 
        matSuffix 
        (click)="togglePasswordVisibility()" 
        type="button"
        [attr.aria-label]="'Şifreyi göster'"
        [attr.aria-pressed]="hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
        {{ getErrorMessage('password') }}
      </mat-error>
      <mat-error *ngIf="loginForm.get('password')?.hasError('minlength') && loginForm.get('password')?.touched">
        {{ getErrorMessage('password') }}
      </mat-error>
    </mat-form-field>

    <!-- Remember Me & Forgot Password -->
    <div class="login-options">
      <mat-checkbox formControlName="rememberMe">Beni hatırla</mat-checkbox>
      <a href="/forgot-password" class="forgot-password-link">Şifremi unuttum</a>
    </div>

    <!-- reCAPTCHA -->
    <div class="recaptcha-wrapper">
      <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
    </div>

    <!-- Submit Button -->
    <button 
      mat-raised-button 
      color="primary" 
      type="submit" 
      class="submit-button"
      [disabled]="isLoading || loginForm.invalid">
      <mat-spinner *ngIf="isLoading" diameter="20" class="button-spinner"></mat-spinner>
      <span *ngIf="!isLoading">Giriş Yap</span>
      <span *ngIf="isLoading">Giriş yapılıyor...</span>
    </button>

    <!-- Register Link -->
    <div class="register-link">
      <p>Hesabınız yok mu? <a routerLink="/register">Üye olun</a></p>
    </div>
  </form>
</div>
