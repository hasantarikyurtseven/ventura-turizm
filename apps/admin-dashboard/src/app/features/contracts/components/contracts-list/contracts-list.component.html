<div class="page-container">
    <!-- Header - Kullanıcılar sayfası ile aynı yapı -->
    <div class="page-header">
        <div class="header-content">
            <h1>Sözleşmeler</h1>
            <p class="subtitle">Kullanım şartları ve gizlilik politikası gibi metinleri yönetin</p>
        </div>
        <div class="header-actions">
            <button mat-raised-button color="primary" (click)="createContract()">
                <mat-icon>add</mat-icon>
                Yeni Sözleşme
            </button>
        </div>
    </div>

    <!-- Main Content Card -->
    <mat-card class="content-card">
        <!-- Data Table -->
        <div class="table-container" *ngIf="!loading">
            <table mat-table [dataSource]="contracts" class="contracts-table">
                <ng-container matColumnDef="title">
                    <th mat-header-cell *matHeaderCellDef>Başlık</th>
                    <td mat-cell *matCellDef="let contract">
                        <span class="contract-title">{{ contract.title }}</span>
                    </td>
                </ng-container>
                <ng-container matColumnDef="slug">
                    <th mat-header-cell *matHeaderCellDef>Slug</th>
                    <td mat-cell *matCellDef="let contract">
                        <span class="slug-badge">{{ contract.slug }}</span>
                    </td>
                </ng-container>
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="actions-column">İşlemler</th>
                    <td mat-cell *matCellDef="let contract" class="actions-column">
                        <button mat-icon-button class="action-btn edit" (click)="editContract(contract)"
                            matTooltip="Düzenle">
                            <mat-icon>mode_edit</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <!-- Empty State -->
                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length">
                        <mat-icon>description</mat-icon>
                        <p>Henüz sözleşme bulunmuyor</p>
                    </td>
                </tr>
            </table>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-container" *ngIf="loading">
            <mat-progress-spinner mode="indeterminate" diameter="50"></mat-progress-spinner>
            <p>Yükleniyor...</p>
        </div>
    </mat-card>
</div>
